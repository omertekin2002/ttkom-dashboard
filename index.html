<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTKOM & USD/TRY</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      background: #1a1a1a;
      color: #ccc;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 540px;
      margin: 0 auto;
    }

    h1 {
      font-size: 0.8rem;
      font-weight: 400;
      color: #555;
      margin-bottom: 2.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a2a;
    }

    .section {
      margin-bottom: 2.5rem;
    }

    .ticker {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 0.3rem;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .price {
      font-size: 2rem;
      font-weight: 700;
      color: #e8e8e8;
      letter-spacing: -0.02em;
    }

    .price-usd {
      font-size: 0.95rem;
      color: #666;
    }

    .change {
      font-size: 0.85rem;
      margin-top: 0.2rem;
    }

    .up { color: #4a9; }
    .down { color: #c66; }

    .meta {
      font-size: 0.7rem;
      color: #444;
      margin-top: 0.4rem;
    }

    .loading { color: #333; }

    .sep {
      border: none;
      border-top: 1px solid #222;
      margin: 2rem 0;
    }

    .error { color: #a55; }

    footer {
      font-size: 0.65rem;
      color: #333;
      line-height: 1.7;
      margin-top: 3rem;
      padding-top: 0.5rem;
      border-top: 1px solid #2a2a2a;
    }

    footer a { color: #555; }

    footer button {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.65rem;
      text-decoration: underline;
      padding: 0;
    }

    footer button:hover { color: #999; }
  </style>
</head>
<body>

  <div class="container">
    <h1>ttkom / usdtry</h1>

    <div class="section">
      <div class="ticker">TTKOM.IS &mdash; Borsa Istanbul</div>
      <div class="price-row">
        <span class="price loading" id="stock-price">---</span>
        <span class="price-usd" id="stock-price-usd"></span>
      </div>
      <div class="change" id="stock-change"></div>
      <div class="meta" id="stock-updated"></div>
    </div>

    <hr class="sep">

    <div class="section">
      <div class="ticker">USD/TRY</div>
      <div class="price-row">
        <span class="price loading" id="fx-rate">---</span>
      </div>
      <div class="change" id="fx-change"></div>
      <div class="meta" id="fx-updated"></div>
    </div>

    <footer>
      ttkom via github actions (every 15m, market hours) · fx via <a href="https://open.er-api.com">open.er-api.com</a><br>
      <button onclick="fetchAll()">refresh fx</button>
    </footer>
  </div>

  <script>
    let ttkomPriceTRY = null;
    let usdTryRate = null;

    function updateUsdPrice() {
      const el = document.getElementById('stock-price-usd');
      if (ttkomPriceTRY !== null && usdTryRate !== null) {
        el.textContent = '$' + (ttkomPriceTRY / usdTryRate).toFixed(2);
      }
    }

    async function fetchStock() {
      const el = document.getElementById('stock-price');
      const usdEl = document.getElementById('stock-price-usd');
      const changeEl = document.getElementById('stock-change');
      const metaEl = document.getElementById('stock-updated');
      try {
        const res = await fetch('data/ttkom.json');
        if (!res.ok) throw new Error('No data file');
        const d = await res.json();

        const change = d.price - d.previousClose;
        const pct = (change / d.previousClose) * 100;
        const sign = change >= 0 ? '+' : '';
        const dir = change >= 0 ? 'up' : 'down';

        el.className = 'price';
        el.textContent = d.price.toFixed(2);

        ttkomPriceTRY = d.price;
        updateUsdPrice();

        changeEl.className = 'change ' + dir;
        changeEl.textContent = sign + change.toFixed(2) + ' (' + sign + pct.toFixed(2) + '%)';

        if (d.updatedAt) {
          metaEl.textContent = new Date(d.updatedAt).toLocaleString();
        }
      } catch (e) {
        el.className = 'price';
        el.innerHTML = '<span class="error">no data</span>';
        usdEl.textContent = '';
        changeEl.textContent = '';
        metaEl.textContent = 'push to github & run the action';
      }
    }

    async function fetchFX() {
      const el = document.getElementById('fx-rate');
      const changeEl = document.getElementById('fx-change');
      const metaEl = document.getElementById('fx-updated');
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD');
        const d = await res.json();
        const rate = d.rates.TRY;

        el.className = 'price';
        el.textContent = rate.toFixed(4);

        usdTryRate = rate;
        updateUsdPrice();

        changeEl.className = 'change';
        changeEl.textContent = '1 USD = ' + rate.toFixed(2) + ' TRY';

        metaEl.textContent = new Date(d.time_last_update_utc).toLocaleDateString();
      } catch (e) {
        el.className = 'price';
        el.innerHTML = '<span class="error">failed</span>';
        changeEl.textContent = '';
      }
    }

    function fetchAll() {
      ttkomPriceTRY = null;
      usdTryRate = null;
      document.getElementById('fx-rate').className = 'price loading';
      document.getElementById('fx-rate').textContent = '---';
      document.getElementById('fx-change').textContent = '';
      document.getElementById('stock-price-usd').textContent = '';
      fetchStock();
      fetchFX();
    }

    fetchAll();
  </script>

</body>
</html>
